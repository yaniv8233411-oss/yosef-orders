<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>יוסף הדייג הזמנות</title><style>
body{margin:0;font-family:Arial,sans-serif;background:#eaf9fb;color:#123}.hero{background:linear-gradient(135deg,#008796,#005a78);color:white;text-align:center;padding:35px 15px;border-radius:0 0 28px 28px}h1{font-size:42px;margin:0 0 12px}.wrap{max-width:720px;margin:auto;padding:24px}.tabs{display:flex;gap:12px}.tab{flex:1;border:0;border-radius:18px;padding:22px;font-size:26px;font-weight:bold;color:#066;background:#dff7fa}.tab.active{background:#008b9a;color:white}.card{background:white;border-radius:24px;padding:28px;margin-top:25px;box-shadow:0 8px 25px #0001}label{display:block;font-size:20px;margin:14px 0 6px}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #b9d8dd;border-radius:14px;padding:16px;font-size:24px}textarea{min-height:150px}.send{width:100%;border:0;border-radius:16px;background:#008b9a;color:white;font-size:30px;font-weight:bold;padding:20px;margin-top:22px}.order{border-top:1px solid #ddd;padding:18px;font-size:22px}.muted{color:#667}.big{font-size:28px;font-weight:bold}.ok{color:green}.new{color:#0a84ff}.hidden{display:none}</style></head><body><div class="hero"><h1>יוסף הדייג</h1><div>POS80 → קופה → טלפון · Yosef Orders v2.3 FINAL</div></div><div class="wrap"><div class="tabs"><button class="tab active" onclick="show('new')">הזמנה חדשה ➕</button><button class="tab" onclick="show('old')">הזמנות אחרונות 📋</button></div><div id="new" class="card"><h2>הזמנה חדשה</h2><label>שם לקוח</label><input id="customer" placeholder="שם הלקוח"><label>טלפון</label><input id="phone" placeholder="052..."><label>מה הלקוח רוצה?</label><textarea id="items" placeholder="לדוגמה: 2 דניס פילה, 3 לברק ספר"></textarea><label>הערות כלליות</label><textarea id="notes" placeholder="להכין ל-2, דחוף, משלוח..."></textarea><label>סוג הזמנה</label><select id="type"><option>איסוף עצמי</option><option>משלוח</option></select><button class="send" onclick="sendOrder()">שלח הזמנה</button><p id="msg"></p></div><div id="old" class="card hidden"><h2>הזמנות אחרונות</h2><div id="list">טוען...</div></div></div><script>
const API=location.origin;function show(x){document.getElementById('new').classList.toggle('hidden',x!=='new');document.getElementById('old').classList.toggle('hidden',x!=='old');document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(x==='new')=== (i===0))); if(x==='old') load();}
async function sendOrder(){let order={customer:customer.value||'לקוח',phone:phone.value||'',items:items.value||'',notes:notes.value||'',type:type.value};let r=await fetch(API+'/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(order)});let j=await r.json();msg.innerHTML='✅ נשלח לקופה: הזמנה #'+j.order.id; customer.value=''; phone.value=''; items.value=''; notes.value='';}
async function load(){let r=await fetch(API+'/api/orders?ts='+Date.now());let a=await r.json();list.innerHTML=a.map(o=>`<div class="order"><div class="big">#${o.id} - ${o.customer||''}</div><div>${o.phone||''}</div><div>${(o.items||'').replace(/\n/g,'<br>')}</div><div class="muted">${o.printed?'✅ הודפס':'חדש'} · ${new Date(o.createdAt).toLocaleString('he-IL')}</div></div>`).join('')||'אין הזמנות';}
</script></body></html>
