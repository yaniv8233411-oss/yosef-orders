<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>תחנת הדפסה</title><script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/qz-tray.js"></script><style>
body{margin:0;font-family:Arial;background:#eef8fb;color:#123}.hero{background:linear-gradient(135deg,#334,#126);color:#fff;text-align:center;padding:28px}h1{margin:0;font-size:35px}.wrap{max-width:940px;margin:auto;padding:20px}.box{background:#fff;border-radius:18px;padding:22px;margin:18px 0}.btn{border:0;border-radius:12px;background:#177da4;color:white;padding:14px 22px;font-size:20px;margin:5px}.btn.danger{background:#a43}.btn.good{background:#168c54}.status{font-size:20px;color:#933;line-height:1.6}.ok{color:green}.order{border-top:1px solid #ddd;padding:18px;font-size:20px}.big{font-size:24px;font-weight:bold}.printed{color:green}.new{color:#07f}.printing{color:#c78a00}input{font-size:18px;padding:8px}.small{font-size:15px;color:#557}.pill{display:inline-block;border-radius:999px;padding:4px 10px;background:#e8f5ff;margin:2px}</style></head><body>
<div class="hero"><h1>תחנת הדפסה - יוסף הדייג v3.0 ENTERPRISE</h1><div>הדפסה אוטומטית פעם אחת בלבד · חתימת QZ · נעילה בשרת</div></div>
<div class="wrap"><div class="box"><button class="btn" onclick="connectQZ(true)">חבר QZ</button><button class="btn" onclick="refreshAll()">רענן</button><button class="btn" onclick="testPrint()">בדיקת הדפסה</button><button id="autoBtn" class="btn good" onclick="toggleAuto()">הפעל אוטומטי</button><button class="btn danger" onclick="clearLocalLocks()">איפוס נעילות מקומי</button><div id="status" class="status">בודק...</div><label>מדפסת: <input id="printer" value="POS80"></label><div class="small">v3.0: אם QZ שואל פעם אחת, לחץ Allow. לאחר מכן כל הזמנה חדשה תנסה להדפיס פעם אחת בלבד.</div></div><div class="box"><h2>הזמנות</h2><div id="orders">אין הזמנות</div></div></div>
<script>
const API=location.origin;
const STATION_ID=localStorage.yosefStationId || ('station-'+Math.random().toString(36).slice(2)); localStorage.yosefStationId=STATION_ID;
let localPrinted=JSON.parse(localStorage.yosefV30Printed||'{}');
let localTried=JSON.parse(localStorage.yosefV30Tried||'{}');
let autoEnabled=localStorage.yosefV30Auto==='on';
let autoBusy=false, connecting=false;

try{
 qz.security.setCertificatePromise((resolve,reject)=>{fetch('/qz-cert.pem?ts='+Date.now()).then(r=>r.text()).then(resolve).catch(reject);});
 qz.security.setSignaturePromise(toSign=>(resolve,reject)=>{fetch('/api/qz/sign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request:toSign})}).then(r=>r.json()).then(j=>j.signature?resolve(j.signature):reject(j.error||'no signature')).catch(reject);});
}catch(e){console.log('QZ security setup error',e);}

function saveLocal(){localStorage.yosefV30Printed=JSON.stringify(localPrinted);localStorage.yosefV30Tried=JSON.stringify(localTried);}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function setStatus(t,good=false){status.className='status '+(good?'ok':'');status.innerHTML=t;console.log('STATUS',t)}
function qzActive(){try{return qz.websocket.isActive();}catch(e){return false;}}
function updateAutoBtn(){autoBtn.textContent=autoEnabled?'עצור אוטומטי':'הפעל אוטומטי';autoBtn.className='btn '+(autoEnabled?'danger':'good');}
function beep(){try{const ac=new (window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator();const g=ac.createGain();o.frequency.value=880;o.connect(g);g.connect(ac.destination);g.gain.value=.12;o.start();setTimeout(()=>{o.stop();ac.close();},300);}catch(e){}}

async function connectQZ(manual=false){
 if(qzActive()){setStatus('QZ מחובר ✅ · מדפסת: '+printer.value+' · אוטומטי: '+(autoEnabled?'פעיל':'כבוי'),true);return true;}
 if(connecting){setStatus('ממתין ל-QZ... אם קופץ חלון לחץ Allow');return false;}
 connecting=true;setStatus('מתחבר ל-QZ... אם קופץ חלון לחץ Allow');
 try{await qz.websocket.connect({retries:1,delay:1});connecting=false;setStatus('QZ מחובר ✅ · מדפסת: '+printer.value,true);return true;}
 catch(e){connecting=false;if(qzActive()){setStatus('QZ מחובר ✅',true);return true;}setStatus('QZ לא מחובר: '+esc(e.message||e));return false;}
}
async function ensureQZ(){return qzActive() || await connectQZ(false);}
function receiptHtml(o){const dt=new Date(o.createdAt||Date.now()).toLocaleString('he-IL');return `<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><style>@page{margin:0}body{direction:rtl;text-align:right;font-family:Arial,'David',sans-serif;margin:0;padding:0;background:#fff;color:#000;width:280px;font-size:18px;line-height:1.35}.r{padding:10px 12px}.center{text-align:center}.title{font-size:28px;font-weight:800}.sub{font-size:15px}.line{border-top:1px dashed #000;margin:9px 0}.big{font-size:24px;font-weight:800}.items{font-size:20px}.notes{font-size:17px}.ltr{direction:ltr;unicode-bidi:bidi-override}.small{font-size:14px}</style></head><body><div class="r"><div class="center title">יוסף הדייג</div><div class="center sub">יותר טרי מזה עוד שוחה בים</div><div class="line"></div><div class="big">הזמנה #${esc(o.id)}</div><div>${esc(dt)}</div><div>לקוח: <b>${esc(o.customer||'')}</b></div><div>טלפון: <span class="ltr">${esc(o.phone||'')}</span></div><div>סוג: ${esc(o.type||'')}</div><div class="line"></div><div class="items">${esc(o.items||'').replace(/\n/g,'<br>')}</div>${o.notes?`<div class="line"></div><div class="notes">הערות: ${esc(o.notes).replace(/\n/g,'<br>')}</div>`:''}<div class="line"></div><div class="center small">יוסף הדייג · עמק רפאים 42</div><br><br></div></body></html>`;}
async function qzPrint(o){const cfg=qz.configs.create(printer.value||'POS80',{rasterize:true,margins:0,copies:1});await qz.print(cfg,[{type:'html',format:'plain',data:receiptHtml(o)}]);}
async function claimOrder(o){const r=await fetch(API+'/api/orders/'+o.id+'/claim',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stationId:STATION_ID})});return await r.json();}
async function markPrinted(o){localPrinted[o.id]=true;saveLocal();await fetch(API+'/api/orders/'+o.id+'/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'printed',printed:true,printedAt:new Date().toISOString()})});}
async function releaseOrder(o,err){await fetch(API+'/api/orders/'+o.id+'/release',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({error:String(err||'')})}).catch(()=>{});}
async function printOrder(o,manual=false){
 if(!manual && (localPrinted[o.id]||localTried[o.id])) return;
 if(!manual) {localTried[o.id]=Date.now(); saveLocal();}
 const ok=await ensureQZ(); if(!ok) throw new Error('QZ לא מחובר');
 let order=o;
 if(o.id!=='TEST' && !manual){const c=await claimOrder(o);if(!c.claimed){setStatus('הזמנה #'+o.id+' כבר נתפסה/הודפסה: '+(c.reason||''),true);return;}order=c.order;}
 try{setStatus('מדפיס הזמנה #'+order.id+'... אם QZ שואל לחץ Allow');await qzPrint(order);if(order.id!=='TEST') await markPrinted(order);setStatus('הודפסה פעם אחת ✅ הזמנה #'+order.id,true);beep();}
 catch(e){if(order.id!=='TEST'){delete localTried[order.id];saveLocal();await releaseOrder(order,e.message||e);}throw e;}
 finally{setTimeout(()=>load(false),600);}
}
async function testPrint(){try{await printOrder({id:'TEST',createdAt:new Date().toISOString(),customer:'בדיקה',phone:'',type:'בדיקה',items:'בדיקת הדפסה v3.0 ENTERPRISE',notes:'אם זה יצא - החיבור עובד'},true);}catch(e){setStatus('שגיאת בדיקה: '+esc(e.message||e));}}
async function load(doAuto=true){try{const r=await fetch(API+'/api/orders?ts='+Date.now());const j=await r.json();const a=j.orders||[];orders.innerHTML=a.map(o=>`<div class="order"><div class="big ${o.printed?'printed':(o.status==='printing'?'printing':'new')}">${o.printed?'✅':(o.status==='printing'?'⏳':'🆕')} #${o.id} - ${esc(o.customer)}</div><div>${esc(o.phone)}</div><div>${esc(o.items).replace(/\n/g,'<br>')}</div><div><span class="pill">סטטוס: ${esc(o.status||'new')}</span>${localTried[o.id]?'<span class="pill">נוסה מקומית</span>':''}</div><button class="btn" onclick='printOrder(${JSON.stringify(o).replace(/'/g,"&#39;")}, true)'>הדפס ידני</button></div>`).join('')||'אין הזמנות';
 if(doAuto && autoEnabled && !autoBusy && qzActive()){const next=a.find(o=>!o.printed && (o.status||'new')==='new' && !localPrinted[o.id] && !localTried[o.id]);if(next){autoBusy=true;try{await printOrder(next,false);}catch(e){setStatus('שגיאת אוטומטי: '+esc(e.message||e));}finally{autoBusy=false;}}}
}catch(e){setStatus('שגיאת טעינת הזמנות: '+esc(e.message||e));}}
function refreshAll(){connectQZ(false);load(true)}
function toggleAuto(){autoEnabled=!autoEnabled;localStorage.yosefV30Auto=autoEnabled?'on':'off';updateAutoBtn();setStatus('אוטומטי: '+(autoEnabled?'פעיל ✅':'כבוי ⛔'),autoEnabled);load(true)}
function clearLocalLocks(){localTried={};localPrinted={};saveLocal();setStatus('איפוס מקומי בוצע ✅',true);load(false)}
updateAutoBtn();load(false);setTimeout(()=>connectQZ(false),500);setInterval(()=>load(true),4000);setInterval(()=>{if(qzActive())setStatus('QZ מחובר ✅ · מדפסת: '+printer.value+' · אוטומטי: '+(autoEnabled?'פעיל':'כבוי'),true)},5000);
</script></body></html>
